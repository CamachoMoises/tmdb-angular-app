<mat-card class="movie-card" (click)="navigateToDetail()">
  <div class="poster-wrapper">
    <img
      mat-card-image
      [src]="movie.poster_path | imageUrl: 'w300'"
      [alt]="movie.title"
      class="poster"
      (error)="onImageError($event)"
    />
    <button
      class="favorite-btn"
      (click)="toggleFavorite($event)"
      [title]="isFavorite ? 'Quitar de favoritos' : 'Agregar a favoritos'"
    >
      <mat-icon>{{ isFavorite ? 'favorite' : 'favorite_border' }}</mat-icon>
    </button>
  </div>
  <mat-card-content>
    <h3 class="title">{{ movie.title }}</h3>
    <div class="meta">
      <span class="year">{{ releaseYear }}</span>
      <mat-chip-set>
        <mat-chip class="rating">{{ movie.vote_average | number: '1.1-1' }}</mat-chip>
      </mat-chip-set>
    </div>
  </mat-card-content>
</mat-card>
