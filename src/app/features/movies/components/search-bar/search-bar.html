<div class="relative w-full">
  <input
    [formControl]="searchControl"
    type="text"
    placeholder="Busca películas"
    autocomplete="off"
    class="w-full bg-zinc-800 text-white placeholder-zinc-500 border border-zinc-700 rounded-lg px-5 py-3 pr-12 text-base focus:outline-none focus:border-netflix-red transition-colors"
  />
  <span class="absolute right-4 top-1/2 -translate-y-1/2 text-zinc-500 text-xl">
    <lucide-icon [img]="SearchIcon" size="20" />
  </span>
  @if (searchControl.value.length > 0 && searchControl.value.length < 2) {
    <p class="mt-1 text-xs text-red-400">Escribe al menos 2 caracteres</p>
  }
</div>
